name: Release wrapper (pm-server) to PyPI

# The `pm-server` distribution is a thin compatibility wrapper that depends on
# `pmlens` (the real package, published by release.yml). Since the Phase-2 rename
# the repo ROOT is `pmlens`, so release.yml only publishes pmlens — the wrapper
# lost its automated publish path. This workflow restores it via OIDC Trusted
# Publishing, so no local PyPI API token is ever needed (matches the .pypirc
# hygiene decision of 2026-05-19). PMSERV-137 Phase-3 / step 7.
#
# Triggers:
#   - push of a v* tag  → publishes the wrapper for that release (auto, future).
#   - workflow_dispatch → one-off / backfill (e.g. the current 0.12.0). Run it
#     from `main` (where this file lives); it builds the wrapper at the version
#     committed on that ref. main already carries the latest wrapper version, so
#     no ref input is needed (and untrusted input in checkout `ref:` is avoided).
#
# PyPI setup (one-time, done by a maintainer on pypi.org):
#   pm-server project → Settings → Publishing → Add a GitHub trusted publisher:
#     Owner=flc-design  Repository=pmlens
#     Workflow=publish-wrapper.yml  Environment=pypi

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build wrapper distributions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build wrapper sdist + wheel
        run: python -m build packaging/pm-server-wrapper --outdir wrapper-dist

      - name: Validate distributions
        run: |
          ls -la wrapper-dist/
          test -n "$(ls wrapper-dist/*.whl 2>/dev/null)"
          test -n "$(ls wrapper-dist/*.tar.gz 2>/dev/null)"
          twine check wrapper-dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: wrapper-dist
          path: wrapper-dist/
          if-no-files-found: error

  publish:
    name: Publish wrapper to PyPI (Trusted Publisher)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pm-server/
    permissions:
      id-token: write       # OIDC required for PyPI Trusted Publisher
      attestations: write   # PEP 740 provenance attestation
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: wrapper-dist
          path: wrapper-dist/

      - name: Publish wrapper to PyPI via Trusted Publisher
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          packages-dir: wrapper-dist/
          # Idempotent republish (see release.yml) — the pypi environment
          # only deploys from v* tags, so wrapper-only fixes re-fire BOTH
          # workflows via a new tag; the pmlens side then no-ops.
          skip-existing: true
