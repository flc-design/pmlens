name: Release to PyPI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Validate distributions
        run: |
          ls -la dist/
          test -n "$(ls dist/*.whl 2>/dev/null)"
          test -n "$(ls dist/*.tar.gz 2>/dev/null)"
          twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI (Trusted Publisher)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pmlens/
    permissions:
      id-token: write       # OIDC required for PyPI Trusted Publisher
      attestations: write   # PEP 740 provenance attestation
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI via Trusted Publisher
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247  # v1.14.1
        with:
          # Idempotent republish: a re-fired tag run must not fail on files
          # already uploaded (e.g. re-tagging to republish the pm-server
          # wrapper after its version-lockstep miss at v0.12.1).
          skip-existing: true

  pack-mcpb:
    name: Pack Claude Desktop/Cowork .mcpb bundle (PMSERV-083)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'

      - name: Validate manifest and build bundle
        run: python scripts/build_mcpb.py

      - name: Upload .mcpb bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: mcpb-bundle
          path: dist/pmlens-*.mcpb
          if-no-files-found: error

  github-release:
    name: Create GitHub Release
    # Release-page automation (2026-07-20): v0.11.0–v0.12.1 shipped to PyPI
    # with no Release page entry, leaving "Latest v0.10.0" stale for weeks.
    # Runs only after the PyPI publish succeeded, and only for plain vX.Y.Z
    # tags — wrapper-republish tags (e.g. v0.12.1-wrapper.1) also match the
    # v* trigger but must not get a Release entry.
    if: ${{ !contains(github.ref_name, '-') }}
    needs: [publish, pack-mcpb]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Download .mcpb bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: mcpb-bundle
          path: mcpb/

      - name: Create Release from the annotated tag (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          git fetch --force origin "refs/tags/$TAG:refs/tags/$TAG"
          title="$(git tag -l --format='%(contents:subject)' "$TAG")"
          git tag -l --format='%(contents:body)' "$TAG" > notes.md
          test -s notes.md || echo "See CHANGELOG.md for details." > notes.md
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG already exists — skipping"
          else
            gh release create "$TAG" mcpb/pmlens-*.mcpb --verify-tag --latest \
              --title "${title:-$TAG}" --notes-file notes.md
          fi
